<svg xmlns="http://www.w3.org/2000/svg" width="760" height="560" viewBox="0 0 760 560" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d0f14"/>
      <stop offset="1" stop-color="#15110a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6e27a"/>
      <stop offset="1" stop-color="#d4af37"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#e9376b" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#e9376b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="760" height="560" rx="20" fill="url(#bg)"/>
  <rect x="1" y="1" width="758" height="558" rx="19" fill="none" stroke="#3a2f12" stroke-width="2"/>
  <ellipse cx="380" cy="300" rx="330" ry="240" fill="url(#glow)"/>

  <text x="380" y="56" text-anchor="middle" fill="url(#gold)" font-size="30" font-weight="800">פירמידת הציות 🦑</text>
  <text x="380" y="84" text-anchor="middle" fill="#cbb25e" font-size="15">○ △ □ — היררכיית השליטה במערכת</text>

  <!-- TOP tier: square = managers / מנהל -->
  <g>
    <rect x="170" y="118" width="420" height="86" rx="12" fill="rgba(212,175,55,0.085)" stroke="url(#gold)" stroke-width="2.5"/>
    <rect x="200" y="139" width="44" height="44" rx="4" fill="none" stroke="#f6e27a" stroke-width="3.5"/>
    <text x="560" y="154" text-anchor="end" fill="#f3e6c0" font-size="22" font-weight="800">ריבוע · מנהל</text>
    <text x="560" y="182" text-anchor="end" fill="#cbb25e" font-size="14">מידת הדין · הצורה היציבה ביותר · תיחום ושליטה</text>
  </g>

  <!-- MIDDLE tier: triangle = soldiers / חייל -->
  <g>
    <rect x="170" y="232" width="420" height="86" rx="12" fill="rgba(212,175,55,0.06)" stroke="rgba(212,175,55,0.55)" stroke-width="2"/>
    <path d="M 200 293 L 222 249 L 244 293 Z" fill="none" stroke="#f6e27a" stroke-width="3.5" stroke-linejoin="round"/>
    <text x="560" y="268" text-anchor="end" fill="#f3e6c0" font-size="22" font-weight="800">משולש · חייל</text>
    <text x="560" y="296" text-anchor="end" fill="#cbb25e" font-size="14">כוח מופנה · חוד החץ שמוציא את הדין לפועל</text>
  </g>

  <!-- BOTTOM tier: circle = workers / עובד -->
  <g>
    <rect x="170" y="346" width="420" height="86" rx="12" fill="rgba(212,175,55,0.045)" stroke="rgba(212,175,55,0.40)" stroke-width="2"/>
    <circle cx="222" cy="389" r="23" fill="none" stroke="#f6e27a" stroke-width="3.5"/>
    <text x="560" y="382" text-anchor="end" fill="#f3e6c0" font-size="22" font-weight="800">עיגול · עובד</text>
    <text x="560" y="410" text-anchor="end" fill="#cbb25e" font-size="14">השכבה הבסיסית · חומר ללא דעת</text>
  </g>

  <!-- base equation -->
  <text x="380" y="484" text-anchor="middle" fill="#e8c840" font-size="17" font-weight="700">דיונון = החומר + הכוח + הדין — מתאחדים למשחק הגמר</text>
  <text x="380" y="514" text-anchor="middle" fill="#9b8a55" font-size="13.5">דיונון = 126 = «עבדים» (גימטריה רגילה · מאומת במנוע)</text>
</svg>
