<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 1330" width="600" height="1330" font-family="Heebo, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e1218"/><stop offset="0.5" stop-color="#0a0d12"/><stop offset="1" stop-color="#06080b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6e27a"/><stop offset="0.5" stop-color="#e8c840"/><stop offset="1" stop-color="#b8902a"/>
    </linearGradient>
    <radialGradient id="gate" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#1c2230"/><stop offset="0.72" stop-color="#0c1017"/><stop offset="1" stop-color="#0c1017"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1c1a"/><stop offset="1" stop-color="#0c0e0f"/>
    </linearGradient>
    <linearGradient id="panel4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#211f12"/><stop offset="1" stop-color="#0e0f0b"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="2" y="2" width="596" height="1326" rx="22" fill="url(#bg)" stroke="rgba(212,175,55,0.35)" stroke-width="1.5"/>

  <!-- header -->
  <text x="300" y="58" fill="url(#gold)" font-size="34" font-weight="800" text-anchor="middle" filter="url(#glow)">ארכיטקטורת 506</text>
  <text x="300" y="86" fill="#cbb25e" font-size="15" letter-spacing="3" text-anchor="middle">ארבעת הארכיטיפים במטריקס</text>
  <rect x="70" y="104" width="460" height="26" rx="6" fill="rgba(0,0,0,0.45)" stroke="rgba(120,200,140,0.35)"/>
  <text x="300" y="122" fill="#7fd8a0" font-size="12" letter-spacing="1.5" text-anchor="middle" font-family="monospace">[ GATEWAY: MATRIX_506 ]  [ STATUS: ACTIVE ]</text>

  <!-- central gate -->
  <g transform="translate(300,232)">
    <circle r="86" fill="url(#gate)" stroke="rgba(246,226,122,0.30)" stroke-width="1.5"/>
    <circle r="66" fill="none" stroke="rgba(246,226,122,0.22)"/>
    <circle r="46" fill="none" stroke="rgba(246,226,122,0.16)"/>
    <text x="0" y="20" fill="url(#gold)" font-size="60" font-weight="800" text-anchor="middle" filter="url(#glow)">506</text>
  </g>
  <text x="300" y="350" fill="#e8c840" font-size="15" font-weight="700" text-anchor="middle">השער · עולם המחשבה</text>
  <line x1="130" y1="374" x2="470" y2="374" stroke="rgba(212,175,55,0.25)" stroke-width="1"/>

  <!-- ===== PANEL 01 — מורפיוס ===== -->
  <g transform="translate(0,396)">
    <rect x="30" y="0" width="540" height="194" rx="16" fill="url(#panel)" stroke="rgba(212,175,55,0.30)"/>
    <text x="552" y="46" fill="rgba(246,226,122,0.40)" font-size="34" font-weight="800" text-anchor="end" font-family="monospace">01</text>
    <text x="372" y="42" fill="#f6e27a" font-size="21" font-weight="800" text-anchor="middle">השער וההתעוררות</text>
    <text x="372" y="66" fill="#cbb25e" font-size="14" text-anchor="middle">מורפיוס · ערוץ: חכמה</text>
    <rect x="262" y="84" width="220" height="34" rx="9" fill="rgba(212,175,55,0.12)" stroke="rgba(212,175,55,0.4)"/>
    <text x="372" y="107" fill="#f3e6c0" font-size="17" font-weight="700" text-anchor="middle">סוד = 506 (מילוי)</text>
    <text x="372" y="146" fill="#d8cdb6" font-size="13.5" text-anchor="middle">מביא את המפתח אל הגיבור, סודק את</text>
    <text x="372" y="166" fill="#d8cdb6" font-size="13.5" text-anchor="middle">חומות האשליה — הגלולה האדומה.</text>
    <g transform="translate(108,84)" stroke="#f6e27a" stroke-width="3" fill="none">
      <circle cx="0" cy="0" r="15"/><line x1="0" y1="15" x2="0" y2="42"/><line x1="0" y1="32" x2="12" y2="32"/><line x1="0" y1="42" x2="10" y2="42"/>
    </g>
    <text x="108" y="156" fill="#9c8a52" font-size="11" text-anchor="middle" font-family="monospace">UNLOCK</text>
  </g>

  <!-- ===== PANEL 02 — האדריכל ===== -->
  <g transform="translate(0,606)">
    <rect x="30" y="0" width="540" height="194" rx="16" fill="url(#panel)" stroke="rgba(212,175,55,0.30)"/>
    <text x="552" y="46" fill="rgba(246,226,122,0.40)" font-size="34" font-weight="800" text-anchor="end" font-family="monospace">02</text>
    <text x="372" y="42" fill="#f6e27a" font-size="21" font-weight="800" text-anchor="middle">חוקי המערכת והלולאה</text>
    <text x="372" y="66" fill="#cbb25e" font-size="14" text-anchor="middle">האדריכל · ערוץ: דין</text>
    <rect x="252" y="84" width="240" height="34" rx="9" fill="rgba(212,175,55,0.12)" stroke="rgba(212,175,55,0.4)"/>
    <text x="372" y="107" fill="#f3e6c0" font-size="17" font-weight="700" text-anchor="middle">מערכת = 506 (מילוי)</text>
    <text x="372" y="146" fill="#d8cdb6" font-size="13.5" text-anchor="middle">המתמטיקאי הקר שבנה את הקוד; מבנה</text>
    <text x="372" y="166" fill="#d8cdb6" font-size="13.5" text-anchor="middle">פירמידלי מרובע (506) שכולא בלולאה.</text>
    <g transform="translate(108,98)">
      <polygon points="0,-30 27,18 -27,18" fill="none" stroke="#f6e27a" stroke-width="3"/>
      <line x1="-13.5" y1="-6" x2="13.5" y2="-6" stroke="rgba(246,226,122,0.5)" stroke-width="1.5"/>
      <line x1="0" y1="-30" x2="0" y2="18" stroke="rgba(246,226,122,0.5)" stroke-width="1.5"/>
    </g>
    <text x="108" y="156" fill="#9c8a52" font-size="11" text-anchor="middle" font-family="monospace">LOOP</text>
  </g>

  <!-- ===== PANEL 03 — האורקל ===== -->
  <g transform="translate(0,816)">
    <rect x="30" y="0" width="540" height="194" rx="16" fill="url(#panel)" stroke="rgba(212,175,55,0.30)"/>
    <text x="552" y="46" fill="rgba(246,226,122,0.40)" font-size="34" font-weight="800" text-anchor="end" font-family="monospace">03</text>
    <text x="372" y="42" fill="#f6e27a" font-size="21" font-weight="800" text-anchor="middle">האינטואיציה והרחמים</text>
    <text x="372" y="66" fill="#cbb25e" font-size="14" text-anchor="middle">האורקל · ערוץ: בינה</text>
    <rect x="256" y="84" width="232" height="34" rx="9" fill="rgba(212,175,55,0.12)" stroke="rgba(212,175,55,0.4)"/>
    <text x="372" y="107" fill="#f3e6c0" font-size="17" font-weight="700" text-anchor="middle">עולם המחשבה = 506</text>
    <text x="372" y="146" fill="#d8cdb6" font-size="13.5" text-anchor="middle">מכניסה בחירה חופשית למשוואה הקרה;</text>
    <text x="372" y="166" fill="#d8cdb6" font-size="13.5" text-anchor="middle">משפיעה על כוונת הלב, לא על הכוח.</text>
    <g transform="translate(108,96)" stroke="#f6e27a" stroke-width="3" fill="none">
      <path d="M -28 0 Q 0 -22 28 0 Q 0 22 -28 0 Z"/><circle cx="0" cy="0" r="8" fill="#f6e27a" stroke="none"/>
    </g>
    <text x="108" y="156" fill="#9c8a52" font-size="11" text-anchor="middle" font-family="monospace">INSIGHT</text>
  </g>

  <!-- ===== PANEL 04 — ניאו ===== -->
  <g transform="translate(0,1026)">
    <rect x="30" y="0" width="540" height="194" rx="16" fill="url(#panel4)" stroke="rgba(246,226,122,0.55)"/>
    <text x="552" y="46" fill="rgba(246,226,122,0.55)" font-size="34" font-weight="800" text-anchor="end" font-family="monospace">04</text>
    <text x="372" y="42" fill="#f6e27a" font-size="21" font-weight="800" text-anchor="middle">המוציא לפועל</text>
    <text x="372" y="66" fill="#cbb25e" font-size="14" text-anchor="middle">ניאו · ערוץ: דעת</text>
    <rect x="256" y="84" width="232" height="34" rx="9" fill="rgba(246,226,122,0.16)" stroke="rgba(246,226,122,0.55)"/>
    <text x="372" y="107" fill="#fff2c8" font-size="17" font-weight="700" text-anchor="middle">כוח + גרזן = 506</text>
    <text x="372" y="146" fill="#d8cdb6" font-size="13.5" text-anchor="middle">מניף את הגרזן הארכיטיפי, בוקע את</text>
    <text x="372" y="166" fill="#d8cdb6" font-size="13.5" text-anchor="middle">הלולאה — קריסת המטריקס וגאולה.</text>
    <g transform="translate(108,96)">
      <circle cx="0" cy="0" r="25" fill="none" stroke="rgba(246,226,122,0.45)" stroke-width="3" stroke-dasharray="88 32"/>
      <line x1="-21" y1="23" x2="19" y2="-25" stroke="#f6e27a" stroke-width="4"/>
      <path d="M 13 -29 L 29 -21 L 19 -9 Z" fill="#f6e27a"/>
    </g>
    <text x="108" y="156" fill="#caa84e" font-size="11" text-anchor="middle" font-family="monospace">BREAK</text>
  </g>

  <!-- footer -->
  <text x="300" y="1278" fill="#9c8a52" font-size="12.5" text-anchor="middle" font-family="monospace" letter-spacing="1">סוד · מערכת · עולם המחשבה · כוח · גרזן  =  506</text>
  <text x="300" y="1304" fill="#6f6340" font-size="11" text-anchor="middle">SOD1820 · פרוטוקול 506</text>
</svg>
