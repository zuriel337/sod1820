<!doctype html><html dir="rtl" lang="he"><head><meta charset="utf-8">
<style>
 body{margin:0;background:#070b12;font-family:Arial,sans-serif;color:#dfeaf3;padding:22px}
 h2{font-size:22px;font-weight:800;color:#eaf2fa;margin:0 0 4px}.muted{font-size:13px;color:#7f97ab;margin-bottom:16px}
 .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;max-width:1080px}
 .card{border-radius:14px;overflow:hidden;border:1px solid rgba(127,200,255,.2);background:#070b12}
 .frame{position:relative;height:150px}.frame canvas{position:absolute;inset:0;width:100%;height:100%}
 .meta{padding:12px 14px;border-top:1px solid rgba(127,200,255,.12)}
 .t{color:#eaf2fa;font-size:15.5px;font-weight:800}.d{color:#8aa0b3;font-size:12.5px;margin-top:3px;line-height:1.6}
</style></head><body>
<h2>🌀 עוד אפקטים — בחר לאן לקחת</h2><div class="muted">חמישה אפקטים תלת-ממדיים קלים. כל אחד רכיב לשימוש חוזר.</div>
<div class="grid" id="g"></div>
<script>
var COLOR="#7fc8ff",NK=["67","506","1820","424","126","218","456","45"];
var STEPS={
 starfield:function(c,w,h,S){if(!S.i){S.i=1;S.s=Array.from({length:140},()=>({x:(Math.random()-.5)*w,y:(Math.random()-.5)*h,z:Math.random()*w}))}c.fillStyle="rgba(7,11,18,0.35)";c.fillRect(0,0,w,h);var cx=w/2,cy=h/2;for(var s of S.s){s.z-=w*.012;if(s.z<=1){s.z=w;s.x=(Math.random()-.5)*w;s.y=(Math.random()-.5)*h}var k=128/s.z,r=(1-s.z/w)*2.4;c.fillStyle=r>1.6?"#eaf6ff":COLOR;c.beginPath();c.arc(cx+s.x*k,cy+s.y*k,Math.max(.4,r),0,6.3);c.fill()}},
 grid:function(c,w,h,S,t){c.fillStyle="rgba(7,11,18,0.4)";c.fillRect(0,0,w,h);var hz=h*.42,vx=w/2,off=(t*.0009)%1;c.strokeStyle=COLOR;c.lineWidth=1;for(var i=0;i<12;i++){var p=(i+off)/12,y=hz+(h-hz)*p*p;c.globalAlpha=.12+.4*p;c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke()}c.globalAlpha=.32;for(i=-7;i<=7;i++){c.beginPath();c.moveTo(vx+i*(w/7),h);c.lineTo(vx+i*7,hz);c.stroke()}c.globalAlpha=1},
 constellation:function(c,w,h,S){if(!S.i){S.i=1;S.p=Array.from({length:46},()=>({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.5}))}c.clearRect(0,0,w,h);var P=S.p;for(var p of P){p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>w)p.vx*=-1;if(p.y<0||p.y>h)p.vy*=-1}for(var i=0;i<P.length;i++)for(var j=i+1;j<P.length;j++){var dx=P[i].x-P[j].x,dy=P[i].y-P[j].y,d2=dx*dx+dy*dy;if(d2<8000){c.strokeStyle=COLOR;c.globalAlpha=1-d2/8000;c.lineWidth=.6;c.beginPath();c.moveTo(P[i].x,P[i].y);c.lineTo(P[j].x,P[j].y);c.stroke()}}c.globalAlpha=1;c.fillStyle="#eaf6ff";for(p of P){c.beginPath();c.arc(p.x,p.y,1.4,0,6.3);c.fill()}},
 numbers:function(c,w,h,S){if(!S.i){S.i=1;S.n=Array.from({length:16},()=>({x:Math.random()*w,y:Math.random()*h,z:.3+Math.random()*1.7,s:NK[Math.random()*NK.length|0]}))}c.fillStyle="rgba(7,11,18,0.28)";c.fillRect(0,0,w,h);for(var n of S.n){n.y-=n.z*.5;if(n.y<-20){n.y=h+20;n.x=Math.random()*w;n.s=NK[Math.random()*NK.length|0]}c.globalAlpha=.25+n.z*.35;c.fillStyle=COLOR;c.font=((10+n.z*14)|0)+"px monospace";c.fillText(n.s,n.x,n.y)}c.globalAlpha=1},
 vortex:function(c,w,h,S){if(!S.i){S.i=1;S.p=Array.from({length:120},()=>({a:Math.random()*6.3,r:6+Math.random()*(Math.min(w,h)*.45),sp:.004+Math.random()*.02}))}c.fillStyle="rgba(7,11,18,0.3)";c.fillRect(0,0,w,h);var cx=w/2,cy=h/2;for(var p of S.p){p.a+=p.sp;p.r-=.12;if(p.r<4)p.r=6+Math.random()*(Math.min(w,h)*.45);var x=cx+Math.cos(p.a)*p.r,y=cy+Math.sin(p.a)*p.r*.6;c.fillStyle=p.r<30?"#eaf6ff":COLOR;c.globalAlpha=.3+(1-p.r/(Math.min(w,h)*.45))*.6;c.beginPath();c.arc(x,y,1.3,0,6.3);c.fill()}c.globalAlpha=1}
};
var FX=[["starfield","שדה כוכבים","טיסה קדימה בין הכוכבים"],["grid","רשת סינתוויב","מישור פרספקטיבה זורם"],["constellation","קונסטלציה","נקודות מתחברות בקווים"],["numbers","מספרים מרחפים","מספרי-המפתח עולים בעומק"],["vortex","מערבולת","חלקיקים סביב הליבה"]];
var g=document.getElementById('g');
FX.forEach(function(f){var card=document.createElement('div');card.className='card';card.innerHTML='<div class="frame"><canvas></canvas></div><div class="meta"><div class="t">'+f[1]+'</div><div class="d">'+f[2]+'</div></div>';g.appendChild(card);var cv=card.querySelector('canvas');cv.width=cv.offsetWidth;cv.height=cv.offsetHeight;var ctx=cv.getContext('2d'),S={};for(var k=0;k<55;k++)STEPS[f[0]](ctx,cv.width,cv.height,S,k*40)});
</script></body></html>
