<!doctype html><html dir="rtl" lang="he"><head><meta charset="utf-8">
<style>
 body{margin:0;background:#050400;font-family:Arial,sans-serif;color:#ede4d3}
 .ban{position:relative;height:280px;overflow:hidden;background:#070b12}
 .ban canvas{position:absolute;inset:0;width:100%;height:100%}
 .fade{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(7,11,18,.05) 35%,#050400 100%)}
 .body{max-width:780px;margin:0 auto;padding:34px 24px 60px;text-align:center}
 .meta{font-size:9px;color:#7a6e52;letter-spacing:4px;text-transform:uppercase;margin-bottom:16px}
 h1{color:#e8c840;font-size:40px;font-weight:700;margin:0;text-shadow:0 0 70px #3a2c00}
</style></head><body>
<div class="ban"><canvas id="r"></canvas><div class="fade"></div></div>
<div class="body"><div class="meta">26.6.2026 · המערכת</div><h1>הצופן הנסתר של מטריקס — 506</h1></div>
<script>
 var COLOR="#23c768",HEAD="#bfffd6",FEAT="506".split(""),fs=16;
 var c=document.getElementById('r');c.width=c.offsetWidth;c.height=c.offsetHeight;
 var x=c.getContext('2d'),cols=Math.floor(c.width/fs),CH="0123456789אבגדהוזחטיכלמנסעפצקרשת".split('');
 var drops=[],feat=[];for(var i=0;i<cols;i++){drops[i]=Math.floor(Math.random()*c.height/fs);feat[i]=Math.random()<0.22}
 x.fillStyle="#070b12";x.fillRect(0,0,c.width,c.height);x.font=fs+"px monospace";
 for(var f=0;f<70;f++){x.fillStyle="rgba(7,11,18,0.16)";x.fillRect(0,0,c.width,c.height);
   for(i=0;i<cols;i++){var fc=feat[i];var ch=fc?FEAT[((drops[i]%FEAT.length)+FEAT.length)%FEAT.length]:CH[Math.random()*CH.length|0];
     x.fillStyle=(fc||Math.random()>0.92)?HEAD:COLOR;x.fillText(ch,i*fs,drops[i]*fs);
     if(drops[i]*fs>c.height&&Math.random()>0.975)drops[i]=0;drops[i]++}}
</script></body></html>
