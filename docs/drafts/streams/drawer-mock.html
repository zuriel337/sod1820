<!doctype html><html dir="rtl" lang="he"><head><meta charset="utf-8">
<style>
 body{margin:0;background:#0a0712;font-family:'Heebo',Arial,sans-serif;display:flex;justify-content:flex-end;padding:20px}
 .panel{width:360px;background:linear-gradient(160deg,rgba(13,10,24,.97),rgba(7,5,16,.97));border:1px solid rgba(212,175,55,.4);border-radius:18px;box-shadow:0 18px 60px rgba(0,0,0,.7);overflow:hidden}
 .head{padding:14px 16px;border-bottom:1px solid rgba(212,175,55,.18)}
 .eyebrow{color:#cbb25e;font-size:11.5px;letter-spacing:3px;text-transform:uppercase;margin-bottom:7px}
 .inp{display:flex;gap:9px}
 .inp input{flex:1;background:#15101f;border:1px solid rgba(212,175,55,.4);border-radius:8px;color:#ede4d3;font-size:16px;font-weight:700;padding:8px 12px}
 .body{padding:14px 15px 24px;display:grid;gap:9px}
 .logo{text-align:center;margin:2px 0 4px;font-weight:900;font-size:26px}
 .logo span{display:inline-block}
 .p{color:#b8ad9a;font-size:14px;line-height:1.65;text-align:center;margin:0 0 4px}
 .big{width:100%;text-align:center;background:#1a1530;color:#f3e6c0;border:1px solid rgba(212,175,55,.45);border-radius:10px;font-size:15px;font-weight:700;padding:13px;cursor:pointer}
 .kt{color:#cbb25e;font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;margin:6px 0 7px;text-align:center}
 .chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
 .chip{color:#ede4d3;font-size:14.5px;font-family:monospace;font-weight:800;border:1px solid rgba(212,175,55,.3);border-radius:999px;padding:6px 13px;background:#15101f}
</style></head><body>
<div class="panel">
 <div class="head"><div class="eyebrow">🧮 מגירת המספר · מחשבון חי</div>
   <div class="inp"><input placeholder="הקלידו מילה או מספר…"></div></div>
 <div class="body">
   <div class="logo">🔢 <span style="color:#c9a227">מ</span><span style="color:#7a1320">נ</span><span style="color:#3b6fb0">ו</span><span style="color:#2f8f5b">ע</span> <span style="color:#9a7818">ה</span><span style="color:#6b3fa0">מ</span><span style="color:#c9a227">ס</span><span style="color:#7a1320">פ</span><span style="color:#3b6fb0">ר</span><span style="color:#2f8f5b">י</span><span style="color:#9a7818">ם</span></div>
   <div class="p">הקלידו מספר או מילה למעלה — או היכנסו למרחב:</div>
   <button class="big">🔢 הגוגל של המספרים</button>
   <button class="big">📚 בית המדרש — מחשבון + הסברי השיטות</button>
   <button class="big">🌳 עץ המספרים</button>
   <button class="big">🔗 הצלבת שיטות</button>
   <button class="big">🖼 גלריית רמזי הגאולה</button>
   <div style="margin-top:6px"><div class="kt">מספרי מפתח</div>
     <div class="chips"><span class="chip">1820</span><span class="chip">506</span><span class="chip">67</span><span class="chip">424</span><span class="chip">45</span><span class="chip">26</span></div></div>
 </div>
</div></body></html>
