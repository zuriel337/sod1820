<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>השוואת כתר — SOD1820</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700&family=Frank+Ruhl+Libre:wght@700&display=swap" rel="stylesheet"/>
<style>
  body{background:#07050E;color:#f6e27a;font-family:'Heebo',sans-serif;margin:0;padding:40px 20px;text-align:center;}
  h1{font-family:'Frank Ruhl Libre',serif;color:#d4af37;}
  .grid{display:flex;gap:40px;justify-content:center;flex-wrap:wrap;margin-top:30px;}
  .card{background:#0d0a0e;border:1px solid rgba(212,175,55,0.25);border-radius:12px;padding:24px;width:280px;}
  .card h2{font-size:17px;color:#f6e27a;}
  .sizes{display:flex;align-items:flex-end;justify-content:center;gap:18px;margin:18px 0;}
  .sizes div{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .sizes span{font-size:10px;color:#8a7a5e;}
  .browser{display:inline-flex;align-items:center;gap:6px;background:#140f0c;border:1px solid rgba(212,175,55,0.2);border-radius:6px 6px 0 0;padding:5px 10px;}
  .browser img{width:16px;height:16px;}
  .browser span{font-size:11px;color:#8a7a5e;}
  .desc{font-size:12px;color:#8a7a5e;line-height:1.5;margin-top:12px;}
</style>
</head>
<body>
  <h1>כתר — מקור צבעוני מול גרסה נקייה</h1>
  <div class="grid">
    <div class="card">
      <h2>מקור (3 אבני ארגמן)</h2>
      <div class="sizes">
        <div><img src="01-crown.svg" width="64" height="64"/><span>64</span></div>
        <div><img src="01-crown.svg" width="32" height="32"/><span>32</span></div>
        <div><img src="01-crown.svg" width="16" height="16"/><span>16</span></div>
      </div>
      <div class="browser"><img src="01-crown.svg"/><span>כי לה' המלוכה</span></div>
      <p class="desc">בולט בגדול, אבל ב־16px האבנים מתערבבות.</p>
    </div>
    <div class="card">
      <h2>נקייה (זהב + אבן אחת) ⭐</h2>
      <div class="sizes">
        <div><img src="01b-crown-clean.svg" width="64" height="64"/><span>64</span></div>
        <div><img src="01b-crown-clean.svg" width="32" height="32"/><span>32</span></div>
        <div><img src="01b-crown-clean.svg" width="16" height="16"/><span>16</span></div>
      </div>
      <div class="browser"><img src="01b-crown-clean.svg"/><span>כי לה' המלוכה</span></div>
      <p class="desc">קריאה וחדה גם ב־16px. ההמלצה שלי.</p>
    </div>
  </div>
</body>
</html>
