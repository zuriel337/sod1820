<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SOD1820 — קורסי גימטריה עם צוריאל פולייס. למד את שפת המספרים הקדומה." />
    <title>כי לה' המלוכה · SOD1820</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&family=David+Libre:wght@400;500;700&family=Frank+Ruhl+Libre:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body { background: #080500; color: #f5f0e8; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #050400; }
      ::-webkit-scrollbar-thumb { background: #3a2a00; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #B8860B; }
      ::selection { background: #3a2a00; color: #E8C84A; }
      @keyframes logo-float {
        0%, 100% { transform: translateY(0px); }
        50%       { transform: translateY(-5px); }
      }
      @keyframes logo-glow {
        0%, 100% { filter: drop-shadow(0 0 4px rgba(184,134,11,0.45)) brightness(0.92); }
        50%       { filter: drop-shadow(0 0 14px rgba(232,200,74,0.85)) brightness(1.12); }
      }
      @keyframes crown-spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .logo-animated {
        animation: logo-float 3.6s ease-in-out infinite,
                   logo-glow  3.6s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
