name: עדכון אוטומטי של Sitemap

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'   # כל יום ב-04:00 UTC

permissions:
  contents: write

jobs:
  sitemap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Regenerate sitemap (מ-Supabase)
        run: node scripts/gen-sitemap.mjs

      - name: Commit sitemap if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- public/sitemap.xml; then
            git add public/sitemap.xml
            git commit -m "עדכון אוטומטי של sitemap.xml"
            git push
          else
            echo "sitemap unchanged"
          fi
